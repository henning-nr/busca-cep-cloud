<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Busca CEP</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d47a1">

  <!-- Materialize -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">

  <!-- CSS CUSTOM -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="blue darken-3">
    <div class="nav-wrapper container">
      <a class="brand-logo">Busca CEP</a>
    </div>
  </nav>

  <div class="container">

    <!-- TABS -->
    <div class="row">
      <div class="col s12">
        <ul class="tabs blue lighten-4">
          <li class="tab col s3"><a class="active" href="#cep-tab">CEP</a></li>
          <li class="tab col s3"><a href="#rua-tab">RUA</a></li>
          <li class="tab col s3"><a href="#log-tab">LOG</a></li>
        </ul>
      </div>

      <!-- CEP -->
      <div id="cep-tab" class="col s12">
        <div class="card painel">
          <h5>Consulta de CEP</h5>

          <div class="row">
            <div class="input-field col s4">
              <input id="cep" type="text">
              <label>CEP</label>
            </div>

            <div class="input-field col s4">
              <input id="cidade" type="text">
              <label>Cidade</label>
            </div>

            <div class="input-field col s4">
              <input id="estado" type="text">
              <label>Estado</label>
            </div>

            <div class="input-field col s4">
              <input id="bairro" type="text">
              <label>Bairro</label>
            </div>

            <div class="input-field col s4">
              <input id="ddd" type="text">
              <label>DDD</label>
            </div>
          </div>

          <button onclick="mostrar()" class="btn blue darken-2">Buscar</button>
          <button onclick="limparCampos()" class="btn grey">Limpar</button>
        </div>
      </div>

      <!-- RUA -->
      <div id="rua-tab" class="col s12">
        <div class="card painel">
          <h5>Busca por Rua</h5>

          <div class="row">
            <div class="col s4">
              <select onchange="buscarCidades(this.value)" id="lista-ufs" class="browser-default"></select>
            </div>

            <div class="col s4">
              <select id="lista-cidades" class="browser-default"></select>
            </div>

            <div class="input-field col s4">
              <input id="rua" type="text">
              <label>Rua</label>
            </div>
          </div>

          <button onclick="mostrarRua()" class="btn blue darken-2">Buscar</button>

          <ul id="lista-ruas" class="collection"></ul>
        </div>
      </div>

      <!-- LOG -->
      <div id="log-tab" class="col s12">
        <div class="card painel">
          <h5>Logs do Sistema</h5>
          <ul id="logs" class="collection log-box"></ul>
        </div>
      </div>

    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.11.0/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@hiseb/confetti@2.1.0/dist/confetti.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

  <script src="js/script.js"></script>

</body>
</html>
